  <script>

    // Check if user is logged in
    $(document).ready(function () {
      if (!localStorage.getItem('user')) {
        alert('Please login to book events');
        window.location.href = 'Login.html';
        return;
      }

      // Pre-fill email from logged in user
      var user = JSON.parse(localStorage.getItem('user'));
      $('#inputBookingemailId').val(user.email);
      $('#inputBookingemailId').prop('readonly', true);
    });

     function getUrlParameter(name) {
    name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
    var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
    var results = regex.exec(location.search);
    return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
  }
var id = getUrlParameter('id');
LoadData(id);

    function LoadData(id) {

      var requestUrl="http://localhost:8080/events/getById?id=" + id;
      
          $.ajax({
                url: requestUrl,
                type: "Get",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function(response) {
                 // alert(JSON.stringify(response));
                  bindData(response);
                  console.log("Event Get data successfully:", response);
                },
                error: function(xhr, status, error) {
                  alert(error);
                  console.error("Error getting data for events:", error);
                }
              });

      }


   function bindData(response){
        var content='';
          var eventCard ='<div class="col-md-8">  <div class="card feature-card shadow-sm mb-3">' +
             '<div class="card-body">' +
             '<h2 class="card-title">' + response.title + '</h2>' +
           //  '<h6 class="card-subtitle mb-2 text-muted">Type: ' + response.type + '</h6>' +   
              '<p class="card-text">' + 
                '👥 Type: ' + response.type +  '<br>' +
                '📍 Location: ' + response.location + '<br>' 
                + '📅 Date: ' + new Date(response.date).toLocaleDateString("nl",{day:"2-digit",month:"2-digit", year:"numeric"}) + '<br>' +
                '💰 Cost: ' + response.cost + '<br>' +
              //  '👥 Max Participants: ' + response.maxNumberOfParticipants +
                '</p>' +
                '</div>' +
                '</div>' +
                '</div>' ;
  
                content += eventCard;
                $('#eventId').val(response.id);
                $('#eventTitle').val(response.title);
                $('#eventType').val(response.type);
                $('#eventDate').val(response.date); 
              //  $('#eventDate').val(new Date(response.date).toLocaleDateString("nl",{day:"2-digit",month:"2-digit", year:"numeric"} ));
                $('#eventLocation').val(response.location);
                $('#eventCost').val(response.cost); 
                $('#eventpublisherId').val(response.publisherId);

                
              
        $('#myeventCard').html(content);

      }


function AddRecord()
  {
            var email = $('#inputBookingemailId').val();
            var quantity = $('#quantity').val();
            var eventId = getUrlParameter('id');
            var bookingDate=new Date().toISOString().split('T')[0];
          
            var Title = $('#eventTitle').val();
            var Type = $('#eventType').val();
            var date = $('#eventDate').val();
            var location = $('#eventLocation').val(); 
            var cost = $('#eventCost').val();
            var publisherId = $('#eventpublisherId').val();


         var requestData = {
            EventId: eventId,
            EmailId: email,
            publisherId:publisherId,
            BookingDate: bookingDate,
            NumberofTickets: quantity,
            SequenceNo: 1,
            title: Title,
            type: Type,
            date: date , 
            location: location,
            cost: cost
            };

    //alert(JSON.stringify(requestData));
      var reqData=JSON.stringify(requestData);
     // alert(reqData);
        $.ajax({
      url: "http://localhost:8080/Booking/create",
      type: "POST",
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      data: reqData,
      headers: {'Accept': '*/*'}, 
      success: function(response) {
        alert("Booking created successfully!");
        console.log("Booking created successfully:", response);
      },
      error: function(xhr, status, error) {
        alert("Error creating booking.");
        console.error("Error creating booking:", error);
      }
    });

    
  }


  </script>
