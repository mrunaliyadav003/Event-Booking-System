<script>
     

$(document).ready(function () {
           
 $.ajax({
      url: "http://localhost:8080/events/getAll",
      type: "GET",
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      success: function(response) {
        bindData(response);
        console.log("Event Get data successfully:", response);
      },
      error: function(xhr, status, error) {
        console.error("Error getting data for events:", error);
      }
    });

        });

 function bindData(response){
              
  
        var content='';
          response.forEach(function(event) {


        var eventCardb="";
        var eventCardc=""
        var ticketcont=event.maxNumberOfParticipants-event.bookingCount;
        


            var eventCard ='<div class="col-md-8">  <div class="card feature-card shadow-sm mb-3">' +
             '<div class="card-body">' +
             '<h5 class="card-title">' + event.title + '</h5>' +
             '<h6 class="card-subtitle mb-2 text-muted">Type: ' + event.type + '</h6>' +
             '<p class="card-text">' +  
              '📍 Location: ' + event.location + '<br>' +
              '📅 Date: ' + new Date(event.date).toLocaleDateString("nl",{day:"2-digit",month:"2-digit", year:"numeric"}) + '<br>' +
              '💰 Cost: GBP ' + event.cost + '<br>' +
              '👥 tickets Available: ' + ticketcont + '<br>' +
              '✓ Rating: ' + event.ratingCount + '|  Message'  + '<br>' +
              '</p>' ;
           
              if(event.bookingCount<event.maxNumberOfParticipants){
                eventCardb= '<a href="Booking.html?id=' + event.id + '" class="btn btn-primary">Registered</a>' ;
              }
              else{
               eventCardb= '<a href="#" class="btn btn-warning">Event Full</a>' ;
              }

             eventCardc= ' <a href="Rating.html?id=' + event.id + '" class="btn btn-warning">Rating & Feedback</a>' +'</div>' +
              '</div>' +
              '</div>' ;
              content = eventCard+ eventCardb + eventCardc;
                return true;
          });
        
        $('#myeventCard').html(content);
      }



</script>
