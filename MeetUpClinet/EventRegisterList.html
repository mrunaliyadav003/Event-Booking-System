<body class="terms-page">

  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="header-container container-fluid container-xl position-relative d-flex align-items-center justify-content-between">

      <a href="index.html" class="logo d-flex align-items-center">

      </a>

          <a class="btn-getstarted" href="event.html">Event  </a>

    </div>
  </header>

  <main class="main">

    <!-- Page Title -->
        <div class="container">
            <h1 class=" heading-title ">Event Register List</h1>
            <br>
          <button class="btn btn-primary" onclick="window.location.href='Register.html'">New Register</button>
          <button class="btn btn-primary" onclick="window.location.href='BookingList.html'">Booking Register</button>
                
          <table id="example" class="table table-striped" style="width:100%">
  <thead >   
    <tr  class="table bg-warning">
      <th scope="col">Publisher Email</th>
      <th scope="col">Title</th>
      <th scope="col">Event Date</th>
      <th scope="col">Location</th>
      <th scope="col">Cost</th>
      <th scope="col">Max Number Of Participants</th>
      <th scope="col">Type</th>
      <th >Action</th>
      
    </tr>
  </thead>
  <tbody>
    </tbody>
</table>

  
          </div>
        </div>
     <!-- End Page Title -->
  </main>
    <div class="container copyright text-center mt-4">

      </div>
    </div>

  </footer>
  <!-- jQuery -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>  
    <script>
        $(document).ready(function () {
           
 $.ajax({
      url: "http://localhost:8080/events/getAll",
      type: "GET",
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      success: function(response) {
        var content='';
          response.forEach(function(event) {
            content += '<tr>';
            content += '<td>' + event.publisherId + '</td>';
            content += '<td>' + event.title + '</td>';
            content += '<td>' + event.date + '</td>';
            content += '<td>' + event.location + '</td>';
            content += '<td>' + event.cost + '</td>';
            content += '<td>' + event.maxNumberOfParticipants + '</td>';
            content += '<td>' + event.type + '</td>';
            content += '<td>';
            content += '<a href="RegisterEdit.html?id='+event.id+'"><button class="btn btn-primary">Edit</button></a>';
            content += '<Input type="button" onclick="deleteRecord(\''+event.id+'\')"  class="btn btn-danger" value="Delete" /></td>';
            content += '</tr>';
          });
          $('#example tbody').html(content);
          $('#example').DataTable();  
        console.log("Event Get data successfully:", response);
      },
      error: function(xhr, status, error) {
        console.error("Error getting data for events:", error);
      }
    });

        });


function deleteRecord(id){
              //  alert(id) ;
                $.ajax({
                url: "http://localhost:8080/events/delete?id="+id,
                type: "DELETE",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
            success: function(response) {
                alert("Event deleted successfully!");
                console.log("Event deleted successfully:", response);
            },
            error: function(xhr, status, error) {
                alert("Error deleting event.");
                console.error("Error deleting event:", error);
            }
          });
          location.reload();
        }

    </script>
    
</body>

</html>
