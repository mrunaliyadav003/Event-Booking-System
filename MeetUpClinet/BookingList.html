          <table id="example" class="table table-striped" style="width:100%">
              <thead >   
              <tr  class="table bg-warning">
                <th scope="col">Register Email-Id </th>
                <th scope="col">Booking Date</th>
                <th scope="col">Number of Tickets</th>
                <th scope="col">Publisher Email-Id</th>
                <th scope="col">Title</th>

  <!-- jQuery -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>  
    <script>
        $(document).ready(function () {
           
 $.ajax({
      url: "http://localhost:8080/Booking/getAll",
      type: "GET",
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      success: function(response) {
        var content='';
          response.forEach(function(event) {
            content += '<tr>';
            content += '<td>' + event.EmailId + '</td>';
            content += '<td>' + new Date(event.BookingDate).toLocaleDateString("nl",{day:"2-digit",month:"2-digit", year:"numeric"} ) + '</td>';
            content += '<td>' + event.NumberofTickets + '</td>';
            content += '<td>' + event.publisherId + '</td>';
            content += '<td>' + event.title + '</td>';
            content += '<td>' + new Date(event.date).toLocaleDateString("nl",{day:"2-digit",month:"2-digit", year:"numeric"} )+ '</td>';
            content += '<td>' + event.location + '</td>';
            content += '<td>' + event.cost + '</td>';
            content += '<td>' + event.type + '</td>';
            content += '</tr>';
          });
          $('#example tbody').html(content);
          $('#example').DataTable();  
        console.log("Event Get data successfully:", response);
      },
      error: function(xhr, status, error) {
        console.error("Error getting data for events:", error);
      }
    });

        });


        function AddRecord(id){
                alert(JSON.stringify(id)) ;
                $.ajax({
                url: "http://localhost:8080/events/delete?id="+JSON.stringify(id),
                type: "delete",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                data: JSON.stringify(id),
            success: function(response) {
                alert("Event deleted successfully!");
                console.log("Event deleted successfully:", response);
            },
            error: function(xhr, status, error) {
                alert("Error deleting event.");
                console.error("Error deleting event:", error);
            }
          });
          location.reload();
             }

    </script>
