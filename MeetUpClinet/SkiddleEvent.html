  <!-- jQuery -->
    <script>
      function bindData(response){
        var content='';
       
          response.forEach(function(event) {

            //var vanueitem=event.vanue;
       //  debugger;
            var location =event.venue.name ? event.venue.name : "N/A";
            var Address;// = vanueitem.address ? vanueitem.address : "N/A";
            var cost= event.ticketpricing.maxPrice ? event.ticketpricing.maxPrice : "N/A";
            

          var eventCard ='<div class="col-md-6">  <div class="card feature-card shadow-sm mb-3">' +
             '<div class="card-body">' +
             '<h5 class="card-title">' + event.eventname + '</h5>' +
             '<h6 class="card-subtitle mb-2 text-muted">Type: ' + event.EventCode + '</h6>' +
             '<p class="card-text">' +  
            '📍 Location: ' + location + '<br>'+
           //   '📍 Address: ' + Address + '<br>' 
 
              '📅 Date: ' + event.date + '<br>' +
              '💰 Cost: ' +event.currency +"  "+ cost + '<br>' +
              '</p>' +
              '<a href="Booking.html?id=' + event.id + '" class="btn btn-success">Register</a>' +
              '</div>' +
              '</div>' +
              '</div>' ;

              content += eventCard;
          });
        
        $('#myeventCard').html(content);
      }



      function searchEvents(lat, lon, radius, studentOnly) {
        var url = "http://localhost:8080/skiddleEventData/search?lat=" + lat + "&lon=" + lon + "&radius=" + radius;
        if (studentOnly) {
          url += "&studentOnly=true";
        }

        $.ajax({
          url: url,
          type: "GET",
          contentType: "application/json; charset=utf-8",
          dataType: "json",
          success: function(response) {
            bindData(response.results);
            console.log("Event Get data successfully:", response);
          },
          error: function(xhr, status, error) {
            console.error("Error getting data for events:", error);
            alert("Error loading events. Please try again.");
          }
        });
      }

      function geocodeLocation(location, callback) {
        $.ajax({
          url: "https://nominatim.openstreetmap.org/search",
          type: "GET",
          data: {
            q: location,
            format: "json",
            limit: 1
          },
          success: function(response) {
            if (response && response.length > 0) {
              callback(response[0].lat, response[0].lon);
            } else {
              alert("Location not found. Please try a different location.");
            }
          },
          error: function() {
            alert("Error finding location. Please try again.");
          }
        });
      }

$(document).ready(function () {

      // Check if user is logged in
      var user = localStorage.getItem('user');
      if (user) {
        user = JSON.parse(user);
        $('#loginBtn').hide();
        $('#eventRegisterBtn').show();
        $('#userWelcome').text('Welcome, ' + user.name).show();
        $('#logoutBtn').show();
      } else {
        $('#loginBtn').show();
        $('#eventRegisterBtn').hide();
        $('#userWelcome').hide();
        $('#logoutBtn').hide();
      }

      // Logout functionality
      $('#logoutBtn').on('click', function(e) {
        e.preventDefault();
        localStorage.removeItem('user');
        localStorage.removeItem('userId');
        localStorage.removeItem('userName');
        localStorage.removeItem('userEmail');
        alert('Logged out successfully!');
        window.location.href = 'index.html';
      });

      // Load default events (Nottingham area, student events only)
      searchEvents(52.950001, -1.150000, 10, true);

      // Handle search form submission
      $('#searchForm').on('submit', function(e) {
        e.preventDefault();

        var cityCoords = $('#citySelect').val().split(',');
        var lat = parseFloat(cityCoords[0]);
        var lon = parseFloat(cityCoords[1]);
        var radius = $('#radius').val();
        var studentOnly = $('#studentOnly').is(':checked');

        searchEvents(lat, lon, radius, studentOnly);
      });

        });


    </script>
