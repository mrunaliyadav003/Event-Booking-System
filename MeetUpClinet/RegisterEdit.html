  <script>

  function EditRecord()
  
  {
  
    var publisherId = $('#inputpublisherId').val();
    var title = $('#inputTitle').val();
    var eventDate =$('#inputDate').val(); 
    var location = $('#inputlocation').val();
    var cost = $('#inputcost').val();
    var maxNumberOfParticipants = $('#inputmaxNumberOfParticipants').val();
    var type = $("input[name='gridRadios']:checked").val();
    

    var record = {
      publisherId: publisherId,
      title: title,
      date: eventDate,
      location: location,
      cost: cost,
      maxNumberOfParticipants: maxNumberOfParticipants,
      type: type
    };


    $.ajax({
      url: "http://localhost:8080/events/update?id=" + id,
      type: "PUT",
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      data: JSON.stringify(record),
      success: function(response) {
        alert("Event updated successfully!");
        console.log("Event updated successfully:", response);
      },
      error: function(xhr, status, error) {
        alert("Error updating event.");
        console.error("Error updating event:", error);
      }
    });
  }
  
  function getUrlParameter(name) {
    name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
    var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
    var results = regex.exec(location.search);
    return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
  }
var id = getUrlParameter('id');
LoadData(id);

function LoadData(id) {

      var requestUrl="http://localhost:8080/events/getById?id=" + id;
      
          $.ajax({
                url: requestUrl,
                type: "Get",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function(response) {
                 // alert(JSON.stringify(response));
                  bindData(response);
                  console.log("Event Get data successfully:", response);
                },
                error: function(xhr, status, error) {
                  alert(error);
                  console.error("Error getting data for events:", error);
                }
              });

      }

function bindData(response){
    let apiDate = new Date(response.date);
          $('#inputpublisherId').val(response.publisherId);
          $('#inputTitle').val(response.title);
          $('#inputDate').val(apiDate.toISOString().split('T')[0]);
          $('#inputlocation').val(response.location);
          $('#inputcost').val(response.cost);
          $('#inputmaxNumberOfParticipants').val(response.maxNumberOfParticipants);
          $("input[name='gridRadios'][value='" + response.type + "']").prop('checked', true);
//           $('#datepicker').datepicker('setDate', apiDate);

          
      }



 

    </script>
