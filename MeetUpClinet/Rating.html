  <script>

    // Check if user is logged in and pre-fill email
    $(document).ready(function () {
      var user = localStorage.getItem('user');
      if (user) {
        user = JSON.parse(user);
        $('#inputstudentId').val(user.email);
        $('#inputstudentId').prop('readonly', true);
      }
    });

     function getUrlParameter(name) {
    name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
    var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
    var results = regex.exec(location.search);
    return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
  }
var id = getUrlParameter('id');
LoadData(id);

    function LoadData(id) {

      var requestUrl="http://localhost:8080/events/getById?id=" + id;
      
          $.ajax({
                url: requestUrl,
                type: "Get",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function(response) {
                 // alert(JSON.stringify(response));
                  bindData(response);
                  console.log("Event Get data successfully:", response);
                },
                error: function(xhr, status, error) {
                  alert(error);
                  console.error("Error getting data for events:", error);
                }
              });

      }


   function bindData(response){
        var content='';
          var eventCard ='<div class="col-md-8">  <div class="card feature-card shadow-sm mb-3">' +
             '<div class="card-body">' +
             '<h2 class="card-title">' + response.title + '</h2>' +
           //  '<h6 class="card-subtitle mb-2 text-muted">Type: ' + response.type + '</h6>' +   
              '<p class="card-text">' + 
                '👥 Type: ' + response.type +  '<br>' +
                '📍 Location: ' + response.location + '<br>' 
                + '📅 Date: ' + new Date(response.date).toLocaleDateString("nl",{day:"2-digit",month:"2-digit", year:"numeric"}) + '<br>' +
                '💰 Cost: ' + response.cost + '<br>' +
              //  '👥 Max Participants: ' + response.maxNumberOfParticipants +
                '</p>' +
                '</div>' +
                '</div>' +
                '</div>' ;
  
                content += eventCard;
                $('#eventId').val(response.id);
              //  $('#eventDate').val(new Date(response.date).toLocaleDateString("nl",{day:"2-digit",month:"2-digit", year:"numeric"} ));


                
              
        $('#myeventCard').html(content);

      }


function AddRecord()
  {
            var StudentId = $('#inputstudentId').val();
            var Comment = $('#inputcomment').val();
            var EventId = getUrlParameter('id');
            var RatingScore = parseInt($('#Rating').val());
            var RatingDate = new Date().toISOString();

            // Validate inputs
            if (!StudentId || !Comment || !EventId) {
              alert("Please fill in all fields");
              return;
            }

            var requestData = {
              eventId: EventId,
              studentId: StudentId,
              score: RatingScore,
              comment: Comment,
              ratingDate: RatingDate
            };

            console.log("Submitting rating:", JSON.stringify(requestData));

            $.ajax({
              url: "http://localhost:8080/Rating/create",
              type: "POST",
              contentType: "application/json; charset=utf-8",
              dataType: "json",
              data: JSON.stringify(requestData),
              success: function(response) {
                alert("Feedback submitted successfully!");
                console.log("Feedback submitted successfully:", response);
                window.location.href = 'Event.html';
              },
              error: function(xhr, status, error) {
                alert("Error submitting Feedback: " + error);
                console.error("Error submitting Feedback:", xhr.responseText);
              }
            });
  }


  </script>
