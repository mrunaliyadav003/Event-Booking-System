
services:
  mongodb:
    image: mongo:latest
    container_name: mongodb-container
    ports:
      - "28017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    image: studentmeetup-app
    container_name: studentmeetup-app-container
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_HOST: mongodb
      SPRING_DATA_MONGODB_PORT: 28017
      SPRING_DATA_MONGODB_DATABASE: myEventDb
    depends_on:
      - mongodb

volumes:
  mongo_data:
