  <script src="js/bootstrap.min.js"></script>

</head>

<body class="index-page">

  <header id="header" class="header d-flex align-items-center fixed-top">
    <div class="header-container container-fluid container-xl position-relative d-flex align-items-center justify-content-between">

      <a href="index.html" class="logo d-flex align-items-center">
        <h1 class="sitename">Meet-Up</h1>
      </a>

      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="Event.html" class="active">Event</a></li>
          <li><a href="SkiddleEvent.html" class="active">Skiddle Event</a></li>
          <li><a href="MyBookings.html" id="myBookingsLink" style="display:none;">My Bookings</a></li>
        </ul>

      </nav>

      <div id="authButtons">
        <a class="btn-getstarted" href="Login.html" id="loginBtn">Login</a>
        <a class="btn-getstarted" href="EventRegisterList.html" id="eventRegisterBtn" style="display:none;">Event Register</a>
        <span id="userWelcome" style="display:none; margin-right: 10px; color: black; font-weight: bold;"></span>
        <span id="subscriptionStatus" style="display:none; margin-right: 10px; font-weight: bold;"></span>
        <a class="btn-getstarted" href="#" id="subscribeBtn" style="display:none;">Subscribe</a>
        <a class="btn-getstarted" href="#" id="logoutBtn" style="display:none;">Logout</a>

  <main class="main">

    <!-- Hero Section -->
    <section id="hero" class="hero section">

      <div class="container" data-aos="fade-up" data-aos-delay="100">

        <div class="row align-items-center">
           <h1 class="hero-title">Welcome to Meet-Up</h1>
          <div class="col-lg-8" data-aos="fade-right" data-aos-delay="200">
           
            <div id="myeventCard">


            </div>

           
          </div>

          <div class="col-lg-4" data-aos="fade-left" data-aos-delay="300">
            <div class="hero-image-wrapper">
              <img src="img/gallery-7.webp"  alt="Global Tech Summit" class="img-fluid hero-image">
            </div>

    <!-- End Hero section-->

      </div>
    </div>

    <footer id="footer" class="footer">

      <p>© <span>Copyright</span> <strong class="px-1 sitename">Meet-Up</strong> <span>All Rights Reserved</span></p>
      <div class="credits">
        Designed by Mrunali 
        
      </div>
    </div>

  </footer>

<script>

$(document).ready(function () {

  // Check if user is logged in
  var user = localStorage.getItem('user');
  var currentUser = null;
  if (user) {
    user = JSON.parse(user);
    currentUser = user;
    $('#loginBtn').hide();
    $('#eventRegisterBtn').show();
    $('#myBookingsLink').show();
    $('#userWelcome').text('Welcome, ' + user.name).show();
    $('#subscriptionStatus').show();
    $('#logoutBtn').show();
    loadSubscriptionStatus(user.email);
  } else {
    $('#loginBtn').show();
    $('#eventRegisterBtn').hide();
    $('#myBookingsLink').hide();
    $('#userWelcome').hide();
    $('#subscriptionStatus').hide();
    $('#subscribeBtn').hide();
    $('#logoutBtn').hide();
  }

  // Logout functionality
  $('#logoutBtn').on('click', function(e) {
    e.preventDefault();
    localStorage.removeItem('user');
    localStorage.removeItem('userId');
    localStorage.removeItem('userName');
    localStorage.removeItem('userEmail');
    alert('Logged out successfully!');
    location.reload();
  });

  $('#subscribeBtn').on('click', function(e) {
    e.preventDefault();
    if (!currentUser || !currentUser.email) {
      alert('Please login to subscribe.');
      return;
    }

    var payload = {
      name: currentUser.name,
      emailId: currentUser.email
    };

    $.ajax({
      url: "http://localhost:8081/students/subscribe",
      type: "POST",
      contentType: "application/json; charset=utf-8",
      data: JSON.stringify(payload),
      success: function(response) {
        if (response.success) {
          updateSubscriptionUI(true);
        } else {
          alert(response.message || 'Subscription failed.');
        }
      },
      error: function(xhr) {
        var errorMsg = 'Subscription failed.';
        if (xhr.responseJSON && xhr.responseJSON.message) {
          errorMsg = xhr.responseJSON.message;
        }
        alert(errorMsg);
      }
    });
  });
           
 $.ajax({
      url: "http://localhost:8081/events/getAll",
      type: "GET",
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      success: function(response) {
        bindData(response);
        console.log("Event Get data successfully:", response);
      },
      error: function(xhr, status, error) {
        console.error("Error getting data for events:", error);
      }
    });

        });

 function loadSubscriptionStatus(email) {
  $.ajax({
    url: "http://localhost:8081/students/subscription?emailId=" + encodeURIComponent(email),
    type: "GET",
    contentType: "application/json; charset=utf-8",
    success: function(response) {
      var subscribed = response.data && response.data.subscribed === true;
      updateSubscriptionUI(subscribed);
    },
    error: function() {
      updateSubscriptionUI(false);
    }
  });
 }

 function updateSubscriptionUI(subscribed) {
  if (subscribed) {
    $('#subscriptionStatus').text('Subscribed').css('color', '#198754').show();
    $('#subscribeBtn').hide();
  } else {
    $('#subscriptionStatus').text('Not Subscribed').css('color', '#b02a37').show();
    $('#subscribeBtn').show();
  }
 }

 function formatEventType(type) {
  if (!type) {
    return '';
  }
  return type.toLowerCase() === 'other' ? 'Social Event' : type;
 }

 function bindData(response){
              
  
        var content='';
          response.forEach(function(event) {


        var eventCardb="";
        var eventCardc=""
        var ticketcont=event.maxNumberOfParticipants-event.bookingCount;
        


            var eventCard ='<div class="col-md-8">  <div class="card feature-card shadow-sm mb-3">' +
             '<div class="card-body">' +
             '<h5 class="card-title">' + event.title + '</h5>' +
             '<h6 class="card-subtitle mb-2 text-muted">Type: ' + formatEventType(event.type) + '</h6>' +
             '<p class="card-text">' +  
              '📍 Location: ' + event.location + '<br>' +
              '📅 Date: ' + new Date(event.date).toLocaleDateString("nl",{day:"2-digit",month:"2-digit", year:"numeric"}) + '<br>' +
              '💰 Cost: GBP ' + event.cost + '<br>' +
              '👥 tickets Available: ' + ticketcont + '<br>' +
              '✓ Rating: ' + event.ratingCount + '|  Message'  + '<br>' +
              '</p>' ;
           
              if(event.bookingCount<event.maxNumberOfParticipants){
                eventCardb= '<a href="Booking.html?id=' + event.id + '" class="btn btn-primary">Registered</a>' ;
              }
              else{
               eventCardb= '<a href="#" class="btn btn-warning">Event Full</a>' ;
              }

             eventCardc= ' <a href="Rating.html?id=' + event.id + '" class="btn btn-warning">Rating & Feedback</a>' +'</div>' +
              '</div>' +
              '</div>' ;
              content = eventCard+ eventCardb + eventCardc;
                return true;
          });
        
        $('#myeventCard').html(content);
      }



</script>
</body>

</html>
