<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Meet-Up | Booking List</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <script src="js/jquery-4.0.0.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="terms-page">

  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="header-container container-fluid container-xl position-relative d-flex align-items-center justify-content-between">
      <a href="index.html" class="logo d-flex align-items-center">
        <h1 class="sitename">Meet-Up</h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="EventRegisterList.html">Event Register</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container" style="padding-top:20px;">
      <h1 class="heading-title">Booking List</h1>
      <br>
      <table id="example" class="table table-striped" style="width:100%">
        <thead>
          <tr class="table bg-warning">
            <th>Student Email</th>
            <th>Booking Date</th>
            <th>Tickets</th>
            <th>Publisher Email</th>
            <th>Title</th>
            <th>Event Date</th>
            <th>Location</th>
            <th>Cost</th>
            <th>Type</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <footer>
    <div class="container copyright text-center mt-4">
      <p>© <span>Copyright</span> <strong class="px-1 sitename">Meet-Up</strong> <span>All Rights Reserved</span></p>
      <div class="credits">Designed by Mrunali</div>
    </div>
  </footer>

  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

  <script>
    const API = 'http://localhost:8080';

    function formatEventType(type) {
      if (!type) return '';
      return type.toLowerCase() === 'other' ? 'Social Event' : type;
    }

    function formatDate(value) {
      if (!value) return '-';
      var date = new Date(value);
      return isNaN(date.getTime()) ? '-' : date.toLocaleDateString("en-GB", {day:"2-digit", month:"2-digit", year:"numeric"});
    }

    $(document).ready(function () {
      $.ajax({
        url: API + "/Booking/getAll",
        type: "GET",
        contentType: "application/json; charset=utf-8",
        success: function(response) {
          var bookings = response.data || response;
          var content = '';
          if (bookings && bookings.length > 0) {
            bookings.forEach(function(b) {
              content += '<tr>';
              content += '<td>' + (b.emailId || '-') + '</td>';
              content += '<td>' + formatDate(b.bookingDate) + '</td>';
              content += '<td>' + (b.numberOfTickets || 1) + '</td>';
              content += '<td>' + (b.publisherId || '-') + '</td>';
              content += '<td>' + (b.title || '-') + '</td>';
              content += '<td>' + formatDate(b.date) + '</td>';
              content += '<td>' + (b.location || '-') + '</td>';
              content += '<td>' + (b.cost == 0 ? 'Free' : b.cost) + '</td>';
              content += '<td>' + formatEventType(b.type) + '</td>';
              content += '</tr>';
            });
          } else {
            content = '<tr><td colspan="9" class="text-center">No bookings found</td></tr>';
          }
          $('#example tbody').html(content);
          $('#example').DataTable();
        },
        error: function() { alert("Error loading bookings"); }
      });
    });
  </script>
</body>
</html>
