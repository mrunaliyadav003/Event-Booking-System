    <script>
        function formatEventType(type) {
          if (!type) {
            return '';
          }
          return type.toLowerCase() === 'other' ? 'Social Event' : type;
        }

        function formatDate(value) {
          if (!value) {
            return '-';
          }
          var date = new Date(value);
          if (isNaN(date.getTime())) {
            return '-';
          }
          return date.toLocaleDateString("nl", {day:"2-digit",month:"2-digit", year:"numeric"});
        }

        $(document).ready(function () {
           
 $.ajax({
      url: "http://localhost:8081/Booking/getAll",
      type: "GET",
      contentType: "application/json; charset=utf-8",
      success: function(response) {
        var content='';
        var bookings = response.data || response; // Handle both old and new format

        if (bookings && bookings.length > 0) {
          bookings.forEach(function(event) {
            content += '<tr>';
            content += '<td>' + event.emailId + '</td>';
            content += '<td>' + formatDate(event.bookingDate) + '</td>';
            content += '<td>' + event.numberOfTickets + '</td>';
            content += '<td>' + event.publisherId + '</td>';
            content += '<td>' + event.title + '</td>';
            content += '<td>' + formatDate(event.date) + '</td>';
            content += '<td>' + event.location + '</td>';
            content += '<td>' + event.cost + '</td>';
            content += '<td>' + formatEventType(event.type) + '</td>';
            content += '</tr>';
          });
        } else {
          content = '<tr><td colspan="9" class="text-center">No bookings found</td></tr>';
        }

        $('#example tbody').html(content);
        $('#example').DataTable();
        console.log("Bookings retrieved successfully:", response);
      },
      error: function(xhr, status, error) {
        console.error("Error getting data for bookings:", error);
        alert("Error loading bookings");
      }
    });

        });


        function AddRecord(id){
                alert(JSON.stringify(id)) ;
                $.ajax({
                url: "http://localhost:8081/events/delete?id="+JSON.stringify(id),
                type: "delete",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                data: JSON.stringify(id),
            success: function(response) {
                alert("Event deleted successfully!");
                console.log("Event deleted successfully:", response);
            },
            error: function(xhr, status, error) {
                alert("Error deleting event.");
                console.error("Error deleting event:", error);
            }
          });
          location.reload();
             }

    </script>
