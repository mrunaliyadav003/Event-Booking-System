    <script>
      function formatEventType(type) {
        if (!type) {
          return '';
        }
        return type.toLowerCase() === 'other' ? 'Social Event' : type;
      }

      function bindData(response){
        var content='';

          response.forEach(function(event) {


        var eventCardb="";
        var eventCardc=""
        var ticketcont=event.maxNumberOfParticipants-event.bookingCount;
        


            var eventCard ='<div class="col-md-6">  <div class="card feature-card shadow-sm mb-3">' +
             '<div class="card-body">' +
             '<h5 class="card-title">' + event.title + '</h5>' +
             '<h6 class="card-subtitle mb-2 text-muted">Type: ' + formatEventType(event.type) + '</h6>' +
             '<p class="card-text">' +  
              '📍 Location: ' + event.location + '<br>' +
              '📅 Date: ' + new Date(event.date).toLocaleDateString("nl",{day:"2-digit",month:"2-digit", year:"numeric"}) + '<br>' +
              '💰 Cost: GBP ' + event.cost + '<br>' +
              '👥 tickets Available: ' + ticketcont + '<br>' +
              '✓ Rating: ' + event.ratingCount + '|  Message'  + '<br>' +
              '</p>' ;
           
              if(event.bookingCount<event.maxNumberOfParticipants){
                eventCardb= '<a href="Booking.html?id=' + event.id + '" class="btn btn-primary">Registered</a>' ;
              }
              else{
               eventCardb= '<a href="#" class="btn btn-warning">Event Full</a>' ;
              }

             eventCardc= ' <a href="Rating.html?id=' + event.id + '" class="btn btn-warning">Rating & Feedback</a>' +'</div>' +
              '</div>' +
              '</div>' ;

              content += eventCard+ eventCardb + eventCardc;
          });
        
        $('#myeventCard').html(content);
      }

 function SearchEvent() {

         var searchTerm = $('#Searchevent').val();

          $.ajax({
                url: "http://localhost:8081/events/SeachByText?text=" + searchTerm,
                type: "GET",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function(response) {
                  bindData(response);
                  console.log("Event Get data successfully:", response);
                },
                error: function(xhr, status, error) {
                  console.error("Error getting data for events:", error);
                }
              });

      }

 function SearchDate() {

         var searchData = $('#SearchDate').val();
       // alert(searchData);
          $.ajax({
                url: "http://localhost:8081/events/getByDate?date=" + searchData,
                type: "GET",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function(response) {
                  bindData(response);
                  console.log("Event Get data successfully:", response);
                },
                error: function(xhr, status, error) {
                  console.error("Error getting data for events:", error);
                }
              });

      }

       function SearchLocation() {

         var searchData = $('#SearchLocation').val();
      //  alert(searchData);
          $.ajax({
                url: "http://localhost:8081/events/getLocation?location=" + searchData,
                type: "GET",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function(response) {
                  bindData(response);
                  console.log("Event Get data successfully:", response);
                },
                error: function(xhr, status, error) {
                  console.error("Error getting data for events:", error);
                }
              });

      }


       function SearchType() {

         var searchData = $('#SearchType').val().trim();
         if (searchData.toLowerCase() === 'social event') {
           searchData = 'other';
         }
        // alert(searchData);

          $.ajax({
                url: "http://localhost:8081/events/getType?type=" + searchData,
                type: "GET",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function(response) {
                  bindData(response);
                  console.log("Event Get data successfully:", response);
                },
                error: function(xhr, status, error) {
                  console.error("Error getting data for events:", error);
                }
              });

      }


$(document).ready(function () {
  var user = localStorage.getItem('user');
  var currentUser = null;
  if (user) {
    user = JSON.parse(user);
    currentUser = user;
    $('#loginBtn').hide();
    $('#eventRegisterBtn').show();
    $('#userWelcome').text('Welcome, ' + user.name).show();
    $('#subscriptionStatus').show();
    $('#logoutBtn').show();
    loadSubscriptionStatus(user.email);
  } else {
    $('#loginBtn').show();
    $('#eventRegisterBtn').hide();
    $('#userWelcome').hide();
    $('#subscriptionStatus').hide();
    $('#subscribeBtn').hide();
    $('#logoutBtn').hide();
  }

  $('#logoutBtn').on('click', function(e) {
    e.preventDefault();
    localStorage.removeItem('user');
    localStorage.removeItem('userId');
    localStorage.removeItem('userName');
    localStorage.removeItem('userEmail');
    alert('Logged out successfully!');
    location.reload();
  });

  $('#subscribeBtn').on('click', function(e) {
    e.preventDefault();
    if (!currentUser || !currentUser.email) {
      alert('Please login to subscribe.');
      return;
    }

    var payload = {
      name: currentUser.name,
      emailId: currentUser.email
    };

    $.ajax({
      url: "http://localhost:8081/students/subscribe",
      type: "POST",
      contentType: "application/json; charset=utf-8",
      data: JSON.stringify(payload),
      success: function(response) {
        if (response.success) {
          updateSubscriptionUI(true);
        } else {
          alert(response.message || 'Subscription failed.');
        }
      },
      error: function(xhr) {
        var errorMsg = 'Subscription failed.';
        if (xhr.responseJSON && xhr.responseJSON.message) {
          errorMsg = xhr.responseJSON.message;
        }
        alert(errorMsg);
      }
    });
  });

 $.ajax({
      url: "http://localhost:8081/events/getAll",
      type: "GET",
      contentType: "application/json; charset=utf-8",
      dataType: "json",
      success: function(response) {
        bindData(response);
        console.log("Event Get data successfully:", response);
      },
      error: function(xhr, status, error) {
        console.error("Error getting data for events:", error);
      }
    });

        });

function loadSubscriptionStatus(email) {
  $.ajax({
    url: "http://localhost:8081/students/subscription?emailId=" + encodeURIComponent(email),
    type: "GET",
    contentType: "application/json; charset=utf-8",
    success: function(response) {
      var subscribed = response.data && response.data.subscribed === true;
      updateSubscriptionUI(subscribed);
    },
    error: function() {
      updateSubscriptionUI(false);
    }
  });
}

function updateSubscriptionUI(subscribed) {
  if (subscribed) {
    $('#subscriptionStatus').text('Subscribed').css('color', '#198754').show();
    $('#subscribeBtn').hide();
  } else {
    $('#subscriptionStatus').text('Not Subscribed').css('color', '#b02a37').show();
    $('#subscribeBtn').show();
  }
}


    </script>
