<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Meet-Up | Events</title>
  <meta name="description" content="">
  <meta name="keywords" content="">
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <script src="js/jquery-4.0.0.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <style>
    .search-row-fixed {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .search-row-fixed .search-item {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 180px;
    }
    .search-row-fixed .search-item label {
      white-space: nowrap;
      margin: 0;
      font-size: 14px;
      font-weight: 500;
    }
    .search-row-fixed .search-item input {
      flex: 1;
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid #ced4da;
      font-size: 14px;
      min-width: 80px;
    }
    .search-row-fixed .search-item button {
      padding: 7px 14px;
      font-size: 14px;
      white-space: nowrap;
    }
    .weather-info-badge {
      display: inline-block;
      background: #e8f4fd;
      color: #1565a8;
      border-radius: 5px;
      padding: 3px 10px;
      font-size: 13px;
      margin: 4px 0 2px 0;
    }
    .message-info-badge {
      display: inline-block;
      background: #fff8e1;
      color: #7c5c00;
      border-radius: 5px;
      padding: 3px 10px;
      font-size: 13px;
      margin: 2px 0 8px 0;
    }
    .btn-subscribe-lock {
      background: #6c757d;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-subscribe-lock:hover {
      background: #5a6268;
    }
  </style>
</head>
<body class="terms-page">
 
  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="header-container container-fluid container-xl position-relative d-flex align-items-center justify-content-between">
      <a href="index.html" class="logo d-flex align-items-center">
        <h1 class="sitename">Meet-Up</h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="Event.html" class="active">Event</a></li>
          <li><a href="SkiddleEvent.html">Skiddle Event</a></li>
          <li><a href="Admin.html" id="adminNavLink" style="display:none; color:#dc3545; font-weight:bold;">Admin</a></li>
        </ul>
      </nav>
      <div id="authButtons">
        <a class="btn-getstarted" href="Login.html" id="loginBtn">Login</a>
        <a class="btn-getstarted" href="EventRegisterList.html" id="eventRegisterBtn" style="display:none;">Event Register</a>
        <span id="userWelcome" style="display:none; margin-right: 10px; font-weight: bold;"></span>
        <span id="subscriptionStatus" style="display:none; margin-right: 10px; font-weight: bold;"></span>
        <a class="btn-getstarted" href="#" id="subscribeBtn" style="display:none;">Subscribe</a>
        <a class="btn-getstarted" href="#" id="logoutBtn" style="display:none;">Logout</a>
      </div>
    </div>
  </header>
 
  <main class="main">
    <div class="page-title">
      <div class="container">
        <br>
        <div class="search-row-fixed">
          <div class="search-item">
            <input type="text" id="Searchevent" placeholder="Search...">
            <button onclick="SearchEvent()" class="btn btn-primary">Search</button>
          </div>
          <div class="search-item">
            <label>Filter by Type</label>
            <input type="text" id="SearchType" placeholder="Search...">
            <button onclick="SearchType()" class="btn btn-primary">Search</button>
          </div>
          <div class="search-item">
            <label>Filter by Date</label>
            <input type="date" id="SearchDate">
            <button onclick="SearchDate()" class="btn btn-primary">Search</button>
          </div>
          <div class="search-item">
            <label>Filter by Location</label>
            <input type="text" id="SearchLocation" placeholder="Search...">
            <button onclick="SearchLocation()" class="btn btn-primary">Search</button>
          </div>
        </div>
        <div id="myeventCard" class="row"></div>
      </div>
    </div>
  </main>
 
  <footer>
    <div class="container copyright text-center mt-4">
      <p>© <span>Copyright</span> <strong class="px-1 sitename">Meet-Up</strong> <span>All Rights Reserved</span></p>
      <div class="credits">Designed by Mrunali</div>
    </div>
  </footer>
 
  <script>
    const ADMIN_EMAIL = 'admin@localhost.com';
    const API = 'http://localhost:8080';
    var isSubscribed = false;
    var isLoggedIn = false;
 
    function formatEventType(type) {
      if (!type) return '';
      return type.toLowerCase() === 'other' ? 'Social Event' : type;
    }
 
    function fetchWeatherForCard(location, date, badgeId) {
      if (!location) { $('#' + badgeId).text('🌤 Location not set'); return; }
      var dateStr = '';
      if (date) { try { dateStr = new Date(date).toISOString().split('T')[0]; } catch(e){} }
      var url = API + "/external/weather?location=" + encodeURIComponent(location);
      if (dateStr) url += "&date=" + dateStr;
      $.ajax({
        url: url, type: "GET",
        success: function(info) {
          var msg = "🌤 " + info.location;
          if (info.temperatureMin != null && info.temperatureMax != null)
            msg += ": " + info.temperatureMin + "°C – " + info.temperatureMax + "°C";
          if (info.precipitationProbability != null)
            msg += " | 🌧 " + info.precipitationProbability + "% rain";
          $('#' + badgeId).text(msg);
        },
        error: function() { $('#' + badgeId).text("🌤 Weather unavailable"); }
      });
    }
 
    function bindData(response) {
      var content = '';
      response.forEach(function(event, index) {
        var ticketcont = event.maxNumberOfParticipants - event.bookingCount;
        var weatherBadgeId = 'weather_' + index;
 
        // ✅ Fix: Show average rating properly rounded to 1 decimal
        var ratingAvg = event.ratingCount || 0;
        var messageBadge = ratingAvg > 0
          ? '⭐ ' + parseFloat(ratingAvg).toFixed(1) + ' / 5 avg rating'
          : '💬 No reviews yet';
 
        // Subscription-aware register button
        var registerBtn = '';
        if (!isLoggedIn) {
          registerBtn = '<a href="Login.html" class="btn btn-secondary">Login to Book</a>';
        } else if (!isSubscribed) {
          registerBtn = '<button class="btn-subscribe-lock" onclick="alert(\'You must subscribe first to book events. Click the Subscribe button above!\')">🔒 Subscribe to Book</button>';
        } else if (event.bookingCount >= event.maxNumberOfParticipants) {
          registerBtn = '<a href="#" class="btn btn-warning">Event Full</a>';
        } else {
          registerBtn = '<a href="Booking.html?id=' + event.id + '" class="btn btn-primary">Register</a>';
        }
 
        content += '<div class="col-md-6">' +
          '<div class="card feature-card shadow-sm mb-3">' +
          '<div class="card-body">' +
          '<h5 class="card-title">' + event.title + '</h5>' +
          '<h6 class="card-subtitle mb-2 text-muted">Type: ' + formatEventType(event.type) + '</h6>' +
          '<p class="card-text">' +
          '📍 Location: ' + event.location + '<br>' +
          '📅 Date: ' + new Date(event.date).toLocaleDateString("nl", {day:"2-digit", month:"2-digit", year:"numeric"}) + '<br>' +
          '💰 Cost: ' + (event.cost == 0 ? 'Free' : 'GBP ' + event.cost) + '<br>' +
          '👥 Tickets Available: ' + ticketcont +
          '</p>' +
          '<div class="weather-info-badge" id="' + weatherBadgeId + '">🌤 Loading weather...</div><br>' +
          '<div class="message-info-badge">' + messageBadge + '</div><br>' +
          registerBtn + '&nbsp;' +
          '<a href="Rating.html?id=' + event.id + '" class="btn btn-warning">Rating & Feedback</a>' +
          '</div></div></div>';
 
        (function(loc, dt, bid, i) {
          setTimeout(function() { fetchWeatherForCard(loc, dt, bid); }, 150 * i);
        })(event.location, event.date, weatherBadgeId, index);
      });
      $('#myeventCard').html(content);
    }
 
    function SearchEvent() {
      $.ajax({ url: API + "/events/SeachByText?text=" + $('#Searchevent').val(),
        type: "GET", dataType: "json", success: bindData });
    }
    function SearchDate() {
      $.ajax({ url: API + "/events/getByDate?date=" + $('#SearchDate').val(),
        type: "GET", dataType: "json", success: bindData });
    }
    function SearchLocation() {
      $.ajax({ url: API + "/events/getLocation?location=" + $('#SearchLocation').val(),
        type: "GET", dataType: "json", success: bindData });
    }
    function SearchType() {
      var val = $('#SearchType').val().trim();
      if (val.toLowerCase() === 'social event') val = 'other';
      $.ajax({ url: API + "/events/getType?type=" + val,
        type: "GET", dataType: "json", success: bindData });
    }
 
    $(document).ready(function () {
      var user = localStorage.getItem('user');
      var currentUser = null;
 
      if (user) {
        user = JSON.parse(user);
        currentUser = user;
        isLoggedIn = true;
        $('#loginBtn').hide();
        $('#eventRegisterBtn').show();
        $('#userWelcome').text('Welcome, ' + user.name).show();
        $('#subscriptionStatus').show();
        $('#logoutBtn').show();
        loadSubscriptionStatus(user.email);
        if (user.email === ADMIN_EMAIL) {
          $('#adminNavLink').show();
        }
      } else {
        $('#loginBtn').show();
        $('#eventRegisterBtn, #userWelcome, #subscriptionStatus, #subscribeBtn, #logoutBtn').hide();
      }
 
      $('#logoutBtn').on('click', function(e) {
        e.preventDefault();
        localStorage.clear();
        alert('Logged out successfully!');
        location.reload();
      });
 
      $('#subscribeBtn').on('click', function(e) {
        e.preventDefault();
        if (!currentUser || !currentUser.email) { alert('Please login to subscribe.'); return; }
        $.ajax({
          url: API + "/students/subscribe", type: "POST",
          contentType: "application/json; charset=utf-8",
          data: JSON.stringify({ name: currentUser.name, emailId: currentUser.email }),
          success: function(r) {
            if (r.success) { updateSubscriptionUI(true); loadAllEvents(); }
            else { alert(r.message || 'Subscription failed.'); }
          },
          error: function(xhr) { alert((xhr.responseJSON && xhr.responseJSON.message) || 'Subscription failed.'); }
        });
      });
 
      loadAllEvents();
    });
 
    function loadAllEvents() {
      $.ajax({
        url: API + "/events/getAll", type: "GET", dataType: "json",
        success: bindData,
        error: function() { console.error("Error loading events"); }
      });
    }
 
    function loadSubscriptionStatus(email) {
      $.ajax({
        url: API + "/students/subscription?emailId=" + encodeURIComponent(email),
        type: "GET",
        success: function(r) {
          updateSubscriptionUI(r.data && r.data.subscribed === true);
          loadAllEvents();
        },
        error: function() { updateSubscriptionUI(false); }
      });
    }
 
    function updateSubscriptionUI(subscribed) {
      isSubscribed = subscribed;
      var user = localStorage.getItem('user');
      if (user) {
        var u = JSON.parse(user);
        localStorage.setItem('subscribed_' + u.email, subscribed ? 'true' : 'false');
      }
      if (subscribed) {
        $('#subscriptionStatus').text('Subscribed ✅').css('color', '#198754').show();
        $('#subscribeBtn').hide();
      } else {
        $('#subscriptionStatus').text('Not Subscribed').css('color', '#b02a37').show();
        $('#subscribeBtn').show();
      }
    }
  </script>
</body>
</html>
