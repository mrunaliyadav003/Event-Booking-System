<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>My Bookings - Student Meet Up</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <script src="js/jquery-4.0.0.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="terms-page">

  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="header-container container-fluid container-xl position-relative d-flex align-items-center justify-content-between">
      <a href="index.html" class="logo d-flex align-items-center">
        <h1 class="sitename">Meet-Up</h1>
      </a>

      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="Event.html">All Events</a></li>
          <li><a href="MyBookings.html" class="active">My Bookings</a></li>
        </ul>
      </nav>

      <div id="authButtons">
        <a class="btn-getstarted" href="Login.html" id="loginBtn">Login</a>
        <a class="btn-getstarted" href="EventRegisterList.html" id="eventRegisterBtn" style="display:none;">Event Register</a>
        <span id="userWelcome" style="display:none; margin-right: 10px; color: black; font-weight: bold;"></span>
        <span id="subscriptionStatus" style="display:none; margin-right: 10px; font-weight: bold;"></span>
        <a class="btn-getstarted" href="#" id="subscribeBtn" style="display:none;">Subscribe</a>
        <a class="btn-getstarted" href="#" id="logoutBtn" style="display:none;">Logout</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="page-title">
      <div class="container">
        <br><br>
        <h1 class="heading-title">My Bookings</h1>
        <br>
        <table id="bookingsTable" class="table table-striped" style="width:100%">
          <thead>
            <tr class="table bg-warning">
              <th>Event Title</th>
              <th>Event Type</th>
              <th>Event Date</th>
              <th>Location</th>
              <th>Cost</th>
              <th>Tickets</th>
              <th>Booking Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer>
    <div class="container copyright text-center mt-4">
      <p>© <span>Copyright</span> <strong class="px-1 sitename">Meet-Up</strong> <span>All Rights Reserved</span></p>
      <div class="credits">Designed by Mrunali</div>
    </div>
  </footer>

  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

  <script>
    $(document).ready(function () {
      // Check authentication
      var user = localStorage.getItem('user');
      if (!user) {
        alert('Please login to view your bookings');
        window.location.href = 'Login.html';
        return;
      }

      user = JSON.parse(user);

      // Update header
      $('#loginBtn').hide();
      $('#eventRegisterBtn').show();
      $('#userWelcome').text('Welcome, ' + user.name).show();
      $('#subscriptionStatus').show();
      $('#logoutBtn').show();
      loadSubscriptionStatus(user.email);

      // Logout functionality
      $('#logoutBtn').on('click', function(e) {
        e.preventDefault();
        localStorage.clear();
        window.location.href = 'index.html';
      });

      $('#subscribeBtn').on('click', function(e) {
        e.preventDefault();
        if (!user || !user.email) {
          alert('Please login to subscribe.');
          return;
        }

        var payload = {
          name: user.name,
          emailId: user.email
        };

        $.ajax({
          url: "http://localhost:8081/students/subscribe",
          type: "POST",
          contentType: "application/json; charset=utf-8",
          data: JSON.stringify(payload),
          success: function(response) {
            if (response.success) {
              updateSubscriptionUI(true);
            } else {
              alert(response.message || 'Subscription failed.');
            }
          },
          error: function(xhr) {
            var errorMsg = 'Subscription failed.';
            if (xhr.responseJSON && xhr.responseJSON.message) {
              errorMsg = xhr.responseJSON.message;
            }
            alert(errorMsg);
          }
        });
      });

      // Load user's bookings
      loadMyBookings(user.email);
    });

    function formatEventType(type) {
      if (!type) {
        return '';
      }
      return type.toLowerCase() === 'other' ? 'Social Event' : type;
    }

    function formatDate(value) {
      if (!value) {
        return '-';
      }
      var date = new Date(value);
      if (isNaN(date.getTime())) {
        return '-';
      }
      return date.toLocaleDateString("nl", {day:"2-digit", month:"2-digit", year:"numeric"});
    }

    function loadMyBookings(email) {
      $.ajax({
        url: "http://localhost:8081/Booking/getMyBookings?email=" + encodeURIComponent(email),
        type: "GET",
        contentType: "application/json; charset=utf-8",
        success: function(response) {
          var content = '';
          var bookings = response.data || [];

          if (bookings.length > 0) {
            bookings.forEach(function(booking) {
              content += '<tr>';
              content += '<td>' + booking.title + '</td>';
              content += '<td>' + formatEventType(booking.type) + '</td>';
              content += '<td>' + formatDate(booking.date) + '</td>';
              content += '<td>' + booking.location + '</td>';
              content += '<td>' + booking.cost + '</td>';
              content += '<td>' + booking.numberOfTickets + '</td>';
              content += '<td>' + formatDate(booking.bookingDate) + '</td>';
              content += '<td><button class="btn btn-danger btn-sm" onclick="cancelBooking(\'' + booking.id + '\')">Cancel</button></td>';
              content += '</tr>';
            });
          } else {
            content = '<tr><td colspan="8" class="text-center">No bookings found. <a href="Event.html">Browse Events</a></td></tr>';
          }

          $('#bookingsTable tbody').html(content);
          $('#bookingsTable').DataTable();
        },
        error: function(xhr, status, error) {
          console.error("Error loading bookings:", error);
          alert("Error loading your bookings");
        }
      });
    }

    function loadSubscriptionStatus(email) {
      $.ajax({
        url: "http://localhost:8081/students/subscription?emailId=" + encodeURIComponent(email),
        type: "GET",
        contentType: "application/json; charset=utf-8",
        success: function(response) {
          var subscribed = response.data && response.data.subscribed === true;
          updateSubscriptionUI(subscribed);
        },
        error: function() {
          updateSubscriptionUI(false);
        }
      });
    }

    function updateSubscriptionUI(subscribed) {
      if (subscribed) {
        $('#subscriptionStatus').text('Subscribed').css('color', '#198754').show();
        $('#subscribeBtn').hide();
      } else {
        $('#subscriptionStatus').text('Not Subscribed').css('color', '#b02a37').show();
        $('#subscribeBtn').show();
      }
    }

    function cancelBooking(bookingId) {
      if (!confirm('Are you sure you want to cancel this booking?')) {
        return;
      }

      var userEmail = JSON.parse(localStorage.getItem('user')).email;

      $.ajax({
        url: "http://localhost:8081/Booking/cancel/" + bookingId + "?email=" + encodeURIComponent(userEmail),
        type: "DELETE",
        contentType: "application/json; charset=utf-8",
        success: function(response) {
          if (response.success) {
            alert("Booking cancelled successfully!");
            location.reload();
          } else {
            alert("Cancellation failed: " + response.message);
          }
        },
        error: function(xhr, status, error) {
          var errorMsg = "Error cancelling booking";
          if (xhr.responseJSON && xhr.responseJSON.message) {
            errorMsg = xhr.responseJSON.message;
          }
          alert(errorMsg);
          console.error("Error:", error);
        }
      });
    }
  </script>

</body>
</html>
