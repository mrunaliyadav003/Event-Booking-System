<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Meet-Up | My Bookings</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <script src="js/jquery-4.0.0.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
</head>
<body class="terms-page">

  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="header-container container-fluid container-xl position-relative d-flex align-items-center justify-content-between">
      <a href="index.html" class="logo d-flex align-items-center">
        <h1 class="sitename">Meet-Up</h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="Event.html">All Events</a></li>
          <li><a href="MyBookings.html" class="active">My Bookings</a></li>
        </ul>
      </nav>
      <div id="authButtons">
        <a class="btn-getstarted" href="Login.html" id="loginBtn">Login</a>
        <a class="btn-getstarted" href="EventRegisterList.html" id="eventRegisterBtn" style="display:none;">Event Register</a>
        <span id="userWelcome" style="display:none; margin-right: 10px; color: black; font-weight: bold;"></span>
        <span id="subscriptionStatus" style="display:none; margin-right: 10px; font-weight: bold;"></span>
        <a class="btn-getstarted" href="#" id="subscribeBtn" style="display:none;">Subscribe</a>
        <a class="btn-getstarted" href="#" id="logoutBtn" style="display:none;">Logout</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="page-title">
      <div class="container">
        <br><br>
        <h1 class="heading-title">My Bookings</h1>
        <br>
        <table id="bookingsTable" class="table table-striped" style="width:100%">
          <thead>
            <tr class="table bg-warning">
              <th>Event Title</th>
              <th>Event Type</th>
              <th>Event Date</th>
              <th>Location</th>
              <th>Cost</th>
              <th>Tickets</th>
              <th>Booking Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer>
    <div class="container copyright text-center mt-4">
      <p>© <span>Copyright</span> <strong class="px-1 sitename">Meet-Up</strong> <span>All Rights Reserved</span></p>
      <div class="credits">Designed by Mrunali</div>
    </div>
  </footer>

  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

  <script>
    const API = 'http://localhost:8080';

    $(document).ready(function () {
      var user = localStorage.getItem('user');
      if (!user) {
        alert('Please login to view your bookings');
        window.location.href = 'Login.html';
        return;
      }
      user = JSON.parse(user);

      $('#loginBtn').hide();
      $('#eventRegisterBtn').show();
      $('#userWelcome').text('Welcome, ' + user.name).show();
      $('#subscriptionStatus').show();
      $('#logoutBtn').show();
      loadSubscriptionStatus(user.email);

      $('#logoutBtn').on('click', function(e) {
        e.preventDefault();
        localStorage.clear();
        window.location.href = 'index.html';
      });

      $('#subscribeBtn').on('click', function(e) {
        e.preventDefault();
        $.ajax({
          url: API + "/students/subscribe", type: "POST",
          contentType: "application/json; charset=utf-8",
          data: JSON.stringify({ name: user.name, emailId: user.email }),
          success: function(r) { if (r.success) updateSubscriptionUI(true); else alert(r.message || 'Failed.'); },
          error: function(xhr) { alert((xhr.responseJSON && xhr.responseJSON.message) || 'Failed.'); }
        });
      });

      loadMyBookings(user.email);
    });

    function formatEventType(type) {
      if (!type) return '';
      return type.toLowerCase() === 'other' ? 'Social Event' : type;
    }

    function formatDate(value) {
      if (!value) return '-';
      var date = new Date(value);
      return isNaN(date.getTime()) ? '-' : date.toLocaleDateString("en-GB", {day:"2-digit", month:"2-digit", year:"numeric"});
    }

    function loadMyBookings(email) {
      $.ajax({
        url: API + "/Booking/getMyBookings?email=" + encodeURIComponent(email),
        type: "GET",
        contentType: "application/json; charset=utf-8",
        success: function(response) {
          var bookings = response.data || [];
          var content = '';
          if (bookings.length > 0) {
            bookings.forEach(function(b) {
              content += '<tr>';
              content += '<td>' + (b.title || '-') + '</td>';
              content += '<td>' + formatEventType(b.type) + '</td>';
              content += '<td>' + formatDate(b.date) + '</td>';
              content += '<td>' + (b.location || '-') + '</td>';
              content += '<td>' + (b.cost == 0 ? 'Free' : b.cost) + '</td>';
              content += '<td>' + (b.numberOfTickets || 1) + '</td>';
              content += '<td>' + formatDate(b.bookingDate) + '</td>';
              content += '<td><button class="btn btn-danger btn-sm" onclick="cancelBooking(\'' + b.id + '\')">Cancel</button></td>';
              content += '</tr>';
            });
          } else {
            content = '<tr><td colspan="8" class="text-center">No bookings found. <a href="Event.html">Browse Events</a></td></tr>';
          }
          $('#bookingsTable tbody').html(content);
          $('#bookingsTable').DataTable();
        },
        error: function() { alert("Error loading your bookings"); }
      });
    }

    function loadSubscriptionStatus(email) {
      $.ajax({
        url: API + "/students/subscription?emailId=" + encodeURIComponent(email),
        type: "GET",
        success: function(r) { updateSubscriptionUI(r.data && r.data.subscribed === true); },
        error: function() { updateSubscriptionUI(false); }
      });
    }

    function updateSubscriptionUI(subscribed) {
      var user = JSON.parse(localStorage.getItem('user'));
      if (user) localStorage.setItem('subscribed_' + user.email, subscribed ? 'true' : 'false');
      if (subscribed) {
        $('#subscriptionStatus').text('Subscribed ✅').css('color', '#198754').show();
        $('#subscribeBtn').hide();
      } else {
        $('#subscriptionStatus').text('Not Subscribed').css('color', '#b02a37').show();
        $('#subscribeBtn').show();
      }
    }

    function cancelBooking(bookingId) {
      if (!confirm('Are you sure you want to cancel this booking?')) return;
      var userEmail = JSON.parse(localStorage.getItem('user')).email;
      $.ajax({
        url: API + "/Booking/cancel/" + bookingId + "?email=" + encodeURIComponent(userEmail),
        type: "DELETE",
        success: function(r) {
          if (r.success) { alert("Booking cancelled successfully!"); location.reload(); }
          else { alert("Cancellation failed: " + r.message); }
        },
        error: function(xhr) { alert((xhr.responseJSON && xhr.responseJSON.message) || "Error cancelling booking"); }
      });
    }
  </script>
</body>
</html>
