<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Meet-Up | Edit Event</title>
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <script src="js/jquery-4.0.0.min.js"></script>
  <script src="js/bootstrap.min.js"></script>
</head>
<body class="terms-page">

  <header id="header" class="header d-flex align-items-center sticky-top">
    <div class="header-container container-fluid container-xl position-relative d-flex align-items-center justify-content-between">
      <a href="index.html" class="logo d-flex align-items-center">
        <h1 class="sitename">Meet-Up</h1>
      </a>
      <nav id="navmenu" class="navmenu">
        <ul>
          <li><a href="index.html">Home</a></li>
        </ul>
      </nav>
      <a class="btn-getstarted" href="EventRegisterList.html">Event Register</a>
    </div>
  </header>

  <main class="main">
    <div class="page-title">
      <div class="heading">
        <div class="container">
          <form>
            <div class="form-group row">
              <label class="col-sm-2 col-form-label"></label>
              <div class="col-sm-10">
                <h1 class="heading-title">Edit Event</h1>
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-2 col-form-label">Publisher Email</label>
              <div class="col-sm-3">
                <input type="email" class="form-control" id="inputpublisherId">
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-2 col-form-label">Title</label>
              <div class="col-sm-6">
                <input type="text" class="form-control" id="inputTitle">
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-2 col-form-label">Event Date</label>
              <div class="col-sm-2">
                <input type="date" class="form-control" id="inputDate">
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-2 col-form-label">Location</label>
              <div class="col-sm-6">
                <input type="text" class="form-control" id="inputlocation">
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-2 col-form-label">Cost (£)</label>
              <div class="col-sm-2">
                <input type="number" class="form-control" id="inputcost" min="0">
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-2 col-form-label">Max Participants</label>
              <div class="col-sm-2">
                <input type="number" class="form-control" id="inputmaxNumberOfParticipants" min="1">
              </div>
            </div>
            <fieldset class="form-group">
              <div class="row">
                <legend class="col-form-label col-sm-2 pt-0">Type</legend>
                <div class="col-sm-4">
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios1" value="sport" checked>
                    <label class="form-check-label" for="gridRadios1">Sport</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios2" value="concert">
                    <label class="form-check-label" for="gridRadios2">Concert</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="gridRadios" id="gridRadios4" value="other">
                    <label class="form-check-label" for="gridRadios4">Social Event</label>
                  </div>
                </div>
              </div>
            </fieldset>
            <br>
            <div class="form-group row">
              <label class="col-sm-2 col-form-label"></label>
              <div class="col-sm-3">
                <input type="button" onclick="EditRecord()" class="btn btn-primary" value="Update">
                <input type="button" class="btn btn-success" value="Cancel" onclick="window.location.href='EventRegisterList.html'">
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container copyright text-center mt-4">
      <p>© <span>Copyright</span> <strong class="px-1 sitename">Meet-Up</strong> <span>All Rights Reserved</span></p>
      <div class="credits">Designed by Mrunali</div>
    </div>
  </footer>

  <script>
    const API = 'http://localhost:8080';

    function getUrlParameter(name) {
      name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
      var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
      var results = regex.exec(location.search);
      return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    var id = getUrlParameter('id');
    LoadData(id);

    function LoadData(id) {
      $.ajax({
        url: API + "/events/getById?id=" + id,
        type: "GET", dataType: "json",
        success: function(r) { bindData(r); },
        error: function(xhr, s, e) { alert(e); }
      });
    }

    function bindData(r) {
      var apiDate = new Date(r.date);
      $('#inputpublisherId').val(r.publisherId);
      $('#inputTitle').val(r.title);
      $('#inputDate').val(apiDate.toISOString().split('T')[0]);
      $('#inputlocation').val(r.location);
      $('#inputcost').val(r.cost);
      $('#inputmaxNumberOfParticipants').val(r.maxNumberOfParticipants);
      $("input[name='gridRadios'][value='" + r.type + "']").prop('checked', true);
    }

    function EditRecord() {
      var publisherId = $('#inputpublisherId').val();
      var title = $('#inputTitle').val();
      var eventDateValue = $('#inputDate').val();
      if (!eventDateValue) { alert("Please select an event date."); return; }
      var eventDateObj = new Date(eventDateValue);
      if (isNaN(eventDateObj.getTime())) { alert("Please enter a valid event date."); return; }
      var eventDate = eventDateObj.toISOString();
      var location = $('#inputlocation').val();
      var cost = parseFloat($('#inputcost').val());
      if (isNaN(cost)) cost = 0;
      var maxNumberOfParticipants = parseInt($('#inputmaxNumberOfParticipants').val(), 10);
      var type = $("input[name='gridRadios']:checked").val();
      if (!maxNumberOfParticipants || maxNumberOfParticipants < 1) { alert("Please enter valid max participants."); return; }

      $.ajax({
        url: API + "/events/update?id=" + id,
        type: "PUT",
        contentType: "application/json; charset=utf-8",
        dataType: "json",
        data: JSON.stringify({ publisherId, title, date: eventDate, location, cost, maxNumberOfParticipants, type }),
        success: function() {
          alert("Event updated successfully!");
          window.location.href = 'EventRegisterList.html';
        },
        error: function(xhr) {
          alert((xhr.responseJSON && xhr.responseJSON.message) || "Error updating event.");
        }
      });
    }
  </script>
</body>
</html>
